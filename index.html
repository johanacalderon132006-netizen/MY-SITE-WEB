<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Red PRO App</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#1f1c2c,#928dab);
    color:white;
}

/* NAV */
nav {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(0,0,0,0.6);
}

nav button {
    background:none;
    border:none;
    color:white;
    cursor:pointer;
}

/* SECCIONES */
.section { display:none; padding:20px; }
.active { display:block; }

/* CARDS */
.card {
    background:white;
    color:black;
    padding:15px;
    margin:10px;
    border-radius:10px;
}

/* GRID */
.grid {
    display:flex;
    flex-wrap:wrap;
}

/* INPUT */
input {
    padding:10px;
    margin:5px;
    border-radius:10px;
    border:none;
}

button {
    padding:10px;
    border:none;
    border-radius:10px;
    background:#00ffd5;
    cursor:pointer;
}
</style>
</head>

<body>

<nav>
    <div>
        <button onclick="ir('inicio')">Inicio</button>
        <button onclick="ir('componentes')">Componentes</button>
    </div>
    <div>
        <span id="user"></span>
        <button onclick="logout()">Salir</button>
    </div>
</nav>

<!-- LOGIN -->
<div id="login" class="section active">
    <h2>Login</h2>
    <input id="email" placeholder="Correo">
    <input id="pass" type="password" placeholder="Contraseña">
    <br>
    <button onclick="login()">Entrar</button>
    <button onclick="register()">Registrarse</button>
</div>

<!-- INICIO -->
<div id="inicio" class="section">
    <h1>🌐 Red Informática PRO</h1>
    <img src="escudo.jpeg" width="100">
    <img src="uefab.jpeg" width="100">
</div>

<!-- COMPONENTES -->
<div id="componentes" class="section">
    <h2>Componentes</h2>

    <div id="lista" class="grid"></div>

    <input id="t" placeholder="Nombre">
    <input id="d" placeholder="Descripción">
    <button onclick="agregar()">Agregar</button>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// 🔴🔴🔴 AQUÍ PEGAS TU CONFIG 🔴🔴🔴
const firebaseConfig = {
  apiKey: "AIzaSyDWaHVyIPohbRLVTCfh7TS6-KRKrdihArc",
  authDomain: "red-pro-app.firebaseapp.com",
  projectId: "red-pro-app",
  storageBucket: "red-pro-app.firebasestorage.app",
  messagingSenderId: "20774388138",
  appId: "1:20774388138:web:492a29492955e4fc916bd3",
  measurementId: "G-1ZG0BHD69Y"
};


// INICIALIZAR
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// NAVEGACIÓN
window.ir = (id)=>{
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
};

// LOGIN
window.register = async ()=>{
    await createUserWithEmailAndPassword(auth, email.value, pass.value);
};

window.login = async ()=>{
    await signInWithEmailAndPassword(auth, email.value, pass.value);
};

window.logout = ()=>{
    signOut(auth);
};


// SESIÓN
onAuthStateChanged(auth, user=>{
    if(user){
        user.innerHTML = user.email;
        ir('inicio');
        cargar();
    }else{
        ir('login');
    }
});


// BASE DE DATOS
function cargar(){
    onSnapshot(collection(db,"componentes"), snap=>{
        let html="";
        snap.forEach(doc=>{
            let d = doc.data();
            html += `<div class="card"><b>${d.t}</b><br>${d.d}</div>`;
        });
        lista.innerHTML = html;
    });
}

window.agregar = async ()=>{
    await addDoc(collection(db,"componentes"), {
        t: t.value,
        d: d.value
    });
};

</script>

</body>
</html>
