<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Universo Extremo</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow-x:hidden;
    cursor: crosshair;
}

/* 🌌 ESTRELLAS */
.stars,.stars2,.stars3{
    position:fixed;width:100%;height:100%;z-index:-1;
}
.stars{background:url('https://www.transparenttextures.com/patterns/stardust.png');animation:move 100s linear infinite}
.stars2{animation:move 200s linear infinite;opacity:.5}
.stars3{animation:move 300s linear infinite;opacity:.2}

@keyframes move{
    from{transform:translateY(0)}
    to{transform:translateY(-2000px)}
}

/* 🌠 ESTRELLA FUGAZ */
.shoot{
    position:absolute;
    width:2px;height:100px;
    background:linear-gradient(white,transparent);
    animation:shoot 6s infinite;
}
@keyframes shoot{
    0%{transform:translate(0,0) rotate(45deg);opacity:1}
    100%{transform:translate(800px,600px) rotate(45deg);opacity:0}
}

/* NAV */
nav{
    position:sticky;top:0;
    background:rgba(0,0,0,.7);
    backdrop-filter:blur(10px);
    padding:15px;text-align:center;
}
nav a{
    color:#00ffd5;margin:10px;
    text-decoration:none;font-weight:bold;
}
nav a:hover{ text-shadow:0 0 10px #00ffd5 }

/* TITULO */
h1{
    text-align:center;
    font-size:60px;
    text-shadow:0 0 25px #00ffd5;
}

/* CARD */
.card{
    background:rgba(255,255,255,.05);
    border-radius:20px;
    padding:20px;
    margin:20px auto;
    width:80%;
    backdrop-filter:blur(10px);
    box-shadow:0 0 20px #00ffd5;
}

/* MEDIA */
.media{
    width:80%;max-width:600px;
    border-radius:20px;
    border:4px solid #00ffd5;
    box-shadow:0 0 30px #00ffd5;
    margin:20px auto;
    display:block;
    transition:.4s;
}
.media:hover{
    transform:scale(1.08);
    box-shadow:0 0 60px #00ffd5;
}

/* 🪐 PLANETAS FLOTANDO */
.planeta{
    position:absolute;
    width:100px;height:100px;
    border-radius:50%;
    background:url('planetas.jpg') center/cover;
    animation:flotar 20s infinite linear;
    box-shadow:0 0 30px #00ffd5;
}

@keyframes flotar{
    0%{top:10%;left:-10%}
    50%{top:60%;left:80%}
    100%{top:10%;left:-10%}
}

/* BOTON */
.btn{
    display:inline-block;
    background:#00ffd5;
    padding:15px;
    border-radius:10px;
    color:black;
    text-decoration:none;
    font-weight:bold;
}

/* 📱 RESPONSIVE */
@media(max-width:600px){
    h1{font-size:35px}
    .media{width:95%}
}
</style>
</head>

<body>

<!-- FONDO -->
<div class="stars"></div>
<div class="stars2"></div>
<div class="stars3"></div>

<!-- EFECTOS -->
<div class="shoot"></div>
<div class="planeta"></div>
