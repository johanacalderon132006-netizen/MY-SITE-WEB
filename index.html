<style>
body{margin:0;font-family:Arial;background:black;color:white;overflow-x:hidden}
.stars,.stars2,.stars3{position:fixed;width:100%;height:100%;z-index:-1}
.stars{background:url('https://www.transparenttextures.com/patterns/stardust.png');animation:move 100s linear infinite}
.stars2{background:url('https://www.transparenttextures.com/patterns/stardust.png');animation:move 200s linear infinite;opacity:.5}
.stars3{background:url('https://www.transparenttextures.com/patterns/stardust.png');animation:move 300s linear infinite;opacity:.2}
@keyframes move{from{transform:translateY(0)}to{transform:translateY(-2000px)}}
nav{background:rgba(0,0,0,.7);padding:15px;text-align:center}
nav a{color:#00ffd5;margin:10px;text-decoration:none;font-weight:bold}
h1{text-align:center;font-size:60px;text-shadow:0 0 20px #00ffd5}
.card{background:rgba(255,255,255,.05);padding:20px;margin:20px auto;width:80%;border-radius:20px;box-shadow:0 0 20px #00ffd5}
.media{width:80%;max-width:600px;border-radius:20px;border:4px solid #00ffd5;box-shadow:0 0 30px #00ffd5;margin:20px auto;display:block}
.planeta{width:150px;height:150px;border-radius:50%;background:url('planetas.jpg') center/cover;margin:auto;animation:girar 10s linear infinite}
@keyframes girar{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>
