<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Universo PRO</title>

<style>
body{margin:0;font-family:Arial;background:black;color:white}

/* NAV */
nav{
    background:#000;
    padding:15px;
    text-align:center;
}
nav a{
    color:#00ffd5;
    margin:10px;
    text-decoration:none;
    cursor:pointer;
}
nav a:hover{ text-shadow:0 0 10px #00ffd5 }

/* SECCIONES */
.section{display:none;padding:20px;text-align:center}
.active{display:block}

/* LOGIN */
#login{
    text-align:center;
    margin-top:100px;
}

/* PLANETAS */
.planeta{
    width:120px;
    margin:10px;
    cursor:pointer;
    border:3px solid #00ffd5;
    border-radius:50%;
}
.planeta:hover{ transform:scale(1.1) }

/* JUEGO */
#game{
    width:300px;
    height:200px;
    border:2px solid #00ffd5;
    margin:auto;
    position:relative;
    overflow:hidden;
}
#player{
    width:30px;height:30px;
    background:#00ffd5;
    position:absolute;
    bottom:0;
}
#enemy{
    width:30px;height:30px;
    background:red;
    position:absolute;
    top:0;
}
</style>
</head>

<body>

<nav>
<a onclick="ir('inicio')">Inicio</a>
<a onclick="checkLogin('solar')">Sistema Solar</a>
<a onclick="checkLogin('juego')">Juego</a>
<a href="astronautas.html">Astronautas</a>
<a href="misiones.html">Misiones</a>
</nav>

<!-- LOGIN -->
<div id="login" class="section active">
<h2>🔐 Ingresa tu nombre</h2>
<input id="user">
<br><br>
<button onclick="login()">Entrar</button>
</div>

<!-- INICIO -->
<div id="inicio" class="section">
<h1>🌌 Universo PRO</h1>
<p id="bienvenida"></p>
</div>

<!-- 🌍 SISTEMA SOLAR -->
<div id="solar" class="section">
<h2>🌍 Sistema Solar</h2>

<img src="mercurio.jpg" class="planeta" onclick="mostrar('Mercurio: planeta más cercano al sol')">
<img src="venus.jpg" class="planeta" onclick="mostrar('Venus: el planeta más caliente')">
<img src="tierra.jpg" class="planeta" onclick="mostrar('Tierra: nuestro hogar')">
<img src="marte.jpg" class="planeta" onclick="mostrar('Marte: planeta rojo')">

<p id="info"></p>
</div>

<!-- 🎮 JUEGO -->
<div id="juego" class="section">
<h2>🎮 Esquiva el enemigo</h2>
<p>Puntaje: <span id="score">0</span></p>

<div id="game">
<div id="player"></div>
<div id="enemy"></div>
</div>
</div>

<script>

// LOGIN
function login(){
    let u = user.value;
    if(u=="") return alert("Escribe tu nombre");
    localStorage.setItem("user", u);
    bienvenida.innerText = "Bienvenido " + u;
    ir("inicio");
}

// BLOQUEAR SIN LOGIN
function checkLogin(seccion){
    if(!localStorage.getItem("user")){
        alert("Debes iniciar sesión");
        return;
    }
    ir(seccion);
}

// NAVEGACIÓN
function ir(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// SISTEMA SOLAR
function mostrar(texto){
    document.getElementById("info").innerText = texto;
}

// JUEGO
let player = document.getElementById("player");
let enemy = document.getElementById("enemy");
let pos = 130;
let enemyY = 0;
let score = 0;

document.addEventListener("keydown", e=>{
    if(e.key=="ArrowLeft") pos-=20;
    if(e.key=="ArrowRight") pos+=20;
    player.style.left = pos+"px";
});

setInterval(()=>{
    enemyY += 5;
    enemy.style.top = enemyY+"px";

    if(enemyY > 170){
        enemyY = 0;
        enemy.style.left = Math.random()*260+"px";
        score++;
        document.getElementById("score").innerText = score;
    }

    // colisión
    let px = player.offsetLeft;
    let ex = enemy.offsetLeft;

    if(enemyY > 140 && Math.abs(px-ex)<30){
        alert("💀 Perdiste | Puntaje: "+score);
        location.reload();
    }

},50);

</script>

</body>
</html>
