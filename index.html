<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Universo PRO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
}

/* NAV (igual en TODAS las páginas) */
nav{
    position:sticky;
    top:0;
    background:#000;
    padding:15px;
    text-align:center;
}
nav a{
    color:#00ffd5;
    margin:10px;
    text-decoration:none;
    font-weight:bold;
}
nav a:hover{ text-shadow:0 0 10px #00ffd5 }

/* SECCIONES */
.section{display:none;padding:20px;text-align:center}
.active{display:block}

/* BOTON */
button{
    padding:10px;
    border:none;
    border-radius:10px;
    background:#00ffd5;
    cursor:pointer;
}

/* PLANETAS */
.planeta{
    display:inline-block;
    margin:10px;
    padding:20px;
    border-radius:50%;
    background:#222;
    cursor:pointer;
}
.planeta:hover{
    background:#00ffd5;
    color:black;
}

/* JUEGO */
#player{
    width:50px;height:50px;
    background:#00ffd5;
    position:relative;
}

/* CARD */
.card{
    background:#111;
    padding:15px;
    margin:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<nav>
<a onclick="ir('inicio')">Inicio</a>
<a onclick="ir('solar')">Sistema Solar</a>
<a onclick="ir('juego')">Juego</a>
<a onclick="ir('panel')">Panel</a>
</nav>

<!-- LOGIN -->
<div id="login" class="section active">
<h2>🔐 Login</h2>
<input id="user" placeholder="Usuario"><br><br>
<button onclick="login()">Entrar</button>
</div>

<!-- INICIO -->
<div id="inicio" class="section">
<h1>🌌 Universo PRO</h1>
<p>Bienvenido</p>
</div>

<!-- 🌍 SISTEMA SOLAR -->
<div id="solar" class="section">
<h2>🌍 Sistema Solar</h2>

<div class="planeta" onclick="info('Mercurio')">Mercurio</div>
<div class="planeta" onclick="info('Venus')">Venus</div>
<div class="planeta" onclick="info('Tierra')">Tierra</div>
<div class="planeta" onclick="info('Marte')">Marte</div>

<p id="info"></p>
</div>

<!-- 🎮 JUEGO -->
<div id="juego" class="section">
<h2>🎮 Juego Espacial</h2>
<p>Mueve con flechas ⬅️➡️</p>
<div id="player"></div>
</div>

<!-- 📊 PANEL -->
<div id="panel" class="section">
<h2>📊 Panel</h2>

<input id="dato" placeholder="Agregar dato">
<button onclick="guardar()">Guardar</button>

<div id="lista"></div>
</div>

<script>

// NAVEGACIÓN
function ir(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// LOGIN LOCAL
function login(){
    let u = document.getElementById("user").value;
    localStorage.setItem("user", u);
    ir("inicio");
}

// SISTEMA SOLAR
function info(p){
    document.getElementById("info").innerText = "Información de " + p;
}

// JUEGO
let pos = 0;
document.addEventListener("keydown", e=>{
    if(e.key=="ArrowRight") pos+=10;
    if(e.key=="ArrowLeft") pos-=10;
    document.getElementById("player").style.left = pos+"px";
});

// PANEL
function guardar(){
    let d = document.getElementById("dato").value;
    let datos = JSON.parse(localStorage.getItem("datos")) || [];
    datos.push(d);
    localStorage.setItem("datos", JSON.stringify(datos));
    mostrar();
}

function mostrar(){
    let datos = JSON.parse(localStorage.getItem("datos")) || [];
    let html="";
    datos.forEach(d=>{
        html += "<div class='card'>"+d+"</div>";
    });
    document.getElementById("lista").innerHTML = html;
}

mostrar();

</script>

</body>
</html>
